name: Update Clones Badge

on:
  schedule:
    - cron: "0 8 * * *"  # 每天 UTC 8:00
  workflow_dispatch:       # 手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get clone count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL=$(gh api repos/${{ github.repository }}/traffic/clones --jq '.count')
          if [ "$TOTAL" -ge 1000 ]; then
            MSG="$(echo "scale=1; $TOTAL/1000" | bc)k"
          else
            MSG="$TOTAL"
          fi
          echo "{\"schemaVersion\":1,\"label\":\"clones\",\"message\":\"$MSG\",\"color\":\"green\"}" > clones.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clones.json
          git diff --cached --quiet || git commit -m "chore: update clones badge ($(date +%Y-%m-%d))"
          git push
